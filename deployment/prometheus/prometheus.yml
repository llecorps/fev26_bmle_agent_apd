# Configuration Prometheus — APD monitoring.
# Scrape l'API de prédiction (/metrics) et node-exporter (infra hôte).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Règles d'alerte (API down, etc.).
rule_files:
  - /etc/prometheus/rules/alert_rules.yml

scrape_configs:
  # API de prédiction APD — métriques applicatives + modèle (Evidently).
  - job_name: predict-api
    metrics_path: /metrics
    static_configs:
      - targets: ["predict-api:8080"]

  # node-exporter — CPU / RAM / disque de l'hôte.
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # Prometheus lui-même (auto-monitoring).
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
