# Provider de dashboards "as code" : Grafana charge au démarrage tous les JSON
# présents dans /var/lib/grafana/dashboards (monté depuis deployment/grafana/dashboards).
apiVersion: 1

providers:
  - name: APD dashboards
    orgId: 1
    folder: APD
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
