x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    DAGSHUB_ACCESS_KEY: ${DAGSHUB_ACCESS_KEY:-}
    DAGSHUB_SECRET_KEY: ${DAGSHUB_SECRET_KEY:-}
    _PIP_ADDITIONAL_REQUIREMENTS: boto3 pyarrow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./raw_files:/app/raw_files
    - ./clean_data:/app/clean_data
    - ./models/data:/app/models/data
    - ./data:/app/data
  networks:
    - chat-network
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── Chatbot stack ───────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - chat-network

  explore-api:
    build: ./api/explore
    ports:
      - "${API_PORT:-8081}:8080"
    volumes:
      - ./data:/data:ro
    environment:
      - DATA_PATH=/data/processed/apd_clean.parquet
      - LLM_URL=http://ollama:11434/v1/chat/completions
      - LLM_MODEL=mistral:7b
      - API_KEY=${API_KEY:-}
    depends_on:
      - ollama
    networks:
      - chat-network

  predict-api:
    build: ./api/predict
    ports:
      - "${PREDICT_PORT:-8082}:8080"
    environment:
      - MODEL_PATH=/models/data/pipline.joblib
      - API_KEY=${API_KEY:-}
    volumes:
      - ./models/data:/app/model:ro
    networks:
      - chat-network

  ui:
    build: ./ui
    ports:
      - "${UI_PORT:-8500}:8500"
    environment:
      - API_URL=http://explore-api:8080/explore
      - API_KEY=${API_KEY:-}
    depends_on:
      - explore-api
      - predict-api
    networks:
      - chat-network

  # ── Airflow stack ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname APD \
          --role Admin \
          --email admin@apd.fr
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  # ── Dashboard ───────────────────────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    ports:
      - "8050:8050"
    volumes:
      - ./clean_data:/app/clean_data:ro
      - ./models/data:/app/models/data:ro
    environment:
      - CLEAN_DIR=/app/clean_data
      - MODEL_DIR=/app/models/data
    networks:
      - chat-network
    restart: always

volumes:
  ollama_data:
  postgres_data:

networks:
  chat-network:
    driver: bridge
