
services:
  explore-api:
    build: ./api
    # Port HÔTE configurable (défaut 8081 pour éviter la collision avec Airflow
    # & co sur 8080). Le port INTERNE reste 8080 : l'UI joint l'API via le
    # réseau Docker sur explore-api:8080, indépendamment du mapping hôte.
    ports:
      - "${API_PORT:-8081}:8080"
    volumes:
      - ./data:/data:ro
    environment:
      - DATA_PATH=/data/processed/apd_clean.parquet
    networks:
      - chat-network

  ui:
    build: ./ui
    ports:
      - "${UI_PORT:-8500}:8500"
    environment:
      - API_URL=http://explore-api:8080/explore
    depends_on:
      - explore-api
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge
