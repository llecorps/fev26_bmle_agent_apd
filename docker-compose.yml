
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - chat-network

  explore-api:
    build: ./api/explore
    ports:
      - "${API_PORT:-8081}:8080"
    volumes:
      - ./data:/data:ro
    environment:
      - DATA_PATH=/data/processed/apd_clean.parquet
      - LLM_URL=http://ollama:11434/v1/chat/completions
      - LLM_MODEL=mistral:7b
      - API_KEY=${API_KEY:-}
    depends_on:
      - ollama
    networks:
      - chat-network

  predict-api:
    build: ./api/predict
    ports:
      - "${PREDICT_PORT:-8082}:8080"
    environment:
      - MODEL_PATH=/models/data/pipline.joblib
      - API_KEY=${API_KEY:-}
    volumes:
      - ./models/data:/app/model:ro
    networks:
      - chat-network

  ui:
    build: ./ui
    ports:
      - "${UI_PORT:-8500}:8500"
    environment:
      - API_URL=http://explore-api:8080/explore
      - API_KEY=${API_KEY:-}
    depends_on:
      - explore-api
      - predict-api
    networks:
      - chat-network

volumes:
  ollama_data:

networks:
  chat-network:
    driver: bridge
