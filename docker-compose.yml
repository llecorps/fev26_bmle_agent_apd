services:
  explore-api:
    build: ./api/explore
    ports:
      - "${API_PORT:-8081}:8080"
    volumes:
      - ./data:/data:ro
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DATA_PATH=/data/processed/apd_explore.parquet
    networks:
      - chat-network

  predict-api:
    build: ./api/predict
    ports:
      - "${PREDICT_PORT:-8082}:8080"
    environment:
      - MODEL_PATH=/models/data/pipline.joblib
    volumes:
      - ./models/data:/app/model:ro
    networks:
      - chat-network

  ui:
    build: ./ui
    ports:
      - "${UI_PORT:-8500}:8500"
    environment:
      - API_URL=http://explore-api:8080/explore
    depends_on:
      - explore-api
      - predict-api
    networks:
      - chat-network

  # ─── MLflow Server ────────────────────────────────

  mlflow:
    build:
      context: ./mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflow
      --serve-artifacts
      --artifacts-destination /mlflow/artifacts
      --allowed-hosts "mlflow,localhost,127.0.0.1,localhost:5050,mlflow:5000"
    ports:
      - "5050:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - chat-network

  # ─── PostgreSQL (backend MLflow) ──────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=mlflow
      - POSTGRES_PASSWORD=mlflow
      - POSTGRES_DB=mlflow
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - chat-network


volumes:
  mlflow_artifacts:
  pg_data:

networks:
  chat-network:
    driver: bridge
